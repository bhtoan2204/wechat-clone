services:
  consul:
    image: hashicorp/consul:1.22
    container_name: ${CONSUL_CONTAINER_NAME}
    env_file:
      - ./secret/.env
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0 -datacenter=dc1
    ports:
      - "8500:8500"
      - "8600:8600/tcp"
      - "8600:8600/udp"
    volumes:
      - consul-data:/consul/data
    networks:
      - shared-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./secret/.env
    depends_on:
      - consul
    networks:
      - shared-network
    deploy:
      replicas: 3

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    env_file:
      - ./gateway/secret/.env
    ports:
      - "8080:8080"
    depends_on:
      - consul
    networks:
      - shared-network

volumes:
  consul-data:

networks:
  shared-network:
    external: true
