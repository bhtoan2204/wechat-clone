services:
  redis:
    image: redis:${REDIS_VERSION}
    container_name: ${REDIS_CONTAINER_NAME}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - shared-network

  cassandra:
    image: cassandra:${CASSANDRA_VERSION}
    container_name: ${CASSANDRA_CONTAINER_NAME}
    ports:
      - "${CASSANDRA_PORT}:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: ${CASSANDRA_CLUSTER_NAME}
      CASSANDRA_DC: ${CASSANDRA_DC}
      CASSANDRA_ENDPOINT_SNITCH: ${CASSANDRA_ENDPOINT_SNITCH}
      MAX_HEAP_SIZE: ${CASSANDRA_MAX_HEAP_SIZE}
      HEAP_NEWSIZE: ${CASSANDRA_HEAP_NEWSIZE}
    volumes:
      - cassandra_data:/var/lib/cassandra
    mem_limit: ${CASSANDRA_MEMORY_LIMIT}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cqlsh ${CASSANDRA_CONTAINER_NAME} 9042 -e 'DESCRIBE KEYSPACES'
            >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 50s
    networks:
      - shared-network

  minio:
    image: minio/minio:${MINIO_VERSION}
    container_name: ${MINIO_CONTAINER_NAME}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://minio:9000/minio/health/live >/dev/null 2>&1 || exit
            1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - shared-network

  postgres-db:
    image: postgres:${POSTGRES_VERSION:-17}
    container_name: ${POSTGRES_CONTAINER_NAME:-chat-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chat_app}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-App123}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      PGTZ: ${PGTZ:-Asia/Ho_Chi_Minh}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    command:
      [
        "postgres",
        "-c",
        "wal_level=${POSTGRES_WAL_LEVEL:-logical}",
        "-c",
        "max_wal_senders=${POSTGRES_MAX_WAL_SENDERS:-10}",
        "-c",
        "max_replication_slots=${POSTGRES_MAX_REPLICATION_SLOTS:-10}",
        "-c",
        "max_slot_wal_keep_size=${POSTGRES_MAX_SLOT_WAL_KEEP_SIZE:-1GB}",
        "-c",
        "shared_buffers=${POSTGRES_SHARED_BUFFERS:-128MB}",
        "-c",
        "effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-256MB}",
        "-c",
        "work_mem=${POSTGRES_WORK_MEM:-4MB}",
        "-c",
        "maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-64MB}",
        "-c",
        "max_connections=${POSTGRES_MAX_CONNECTIONS:-50}",
        "-c",
        "timezone=Asia/Ho_Chi_Minh",
        "-c",
        "log_timezone=Asia/Ho_Chi_Minh",
      ]
    mem_limit: ${POSTGRES_MEMORY_LIMIT}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-chat_app}
            >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      - shared-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTICSEARCH_VERSION}
    container_name: ${ELASTICSEARCH_CONTAINER_NAME}
    ports:
      - "${ELASTICSEARCH_PORT}:9200"
    environment:
      discovery.type: ${ELASTICSEARCH_DISCOVERY_TYPE}
      xpack.security.enabled: "${ELASTICSEARCH_XPACK_SECURITY_ENABLED}"
      xpack.ml.enabled: "false"
      ingest.geoip.downloader.enabled: "false"
      ES_JAVA_OPTS: ${ELASTICSEARCH_JAVA_OPTS}
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    mem_limit: ${ELASTICSEARCH_MEMORY_LIMIT}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS
            http://${ELASTICSEARCH_CONTAINER_NAME}:9200/_cluster/health?wait_fo\
            r_status=yellow&timeout=1s >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 40s
    networks:
      - shared-network

  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTICSEARCH_VERSION}
    container_name: ${KIBANA_CONTAINER_NAME:-chat-kibana}
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://${ELASTICSEARCH_CONTAINER_NAME}:9200
      NODE_OPTIONS: ${KIBANA_NODE_OPTIONS}
    depends_on:
      elasticsearch:
        condition: service_healthy
    profiles:
      - ops-ui
    mem_limit: ${KIBANA_MEMORY_LIMIT}
    restart: unless-stopped
    networks:
      - shared-network

  # fluent-bit:
  #   image: cr.fluentbit.io/fluent/fluent-bit:3.1
  #   container_name: ${FLUENT_BIT_CONTAINER_NAME:-chat-fluent-bit}
  #   ports:
  #     - "24224:24224"
  #   volumes:
  #     - ./observability/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
  #     - ./observability/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
  #   depends_on:
  #     elasticsearch:
  #       condition: service_healthy
  #   restart: unless-stopped
  #   networks:
  #     - shared-network

  kafka:
    image: confluentinc/cp-kafka:${KAFKA_VERSION}
    container_name: ${KAFKA_CONTAINER_NAME}
    ports:
      - "${KAFKA_EXTERNAL_PORT}:9092"
    environment:
      KAFKA_NODE_ID: ${KAFKA_NODE_ID}
      KAFKA_PROCESS_ROLES: ${KAFKA_PROCESS_ROLES}
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_CONTROLLER_QUORUM_VOTERS}
      KAFKA_LISTENERS: ${KAFKA_LISTENERS}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME}
      KAFKA_CONTROLLER_LISTENER_NAMES: ${KAFKA_CONTROLLER_LISTENER_NAMES}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR}
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: ${KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS}
      KAFKA_LOG_DIRS: ${KAFKA_LOG_DIRS}
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS}
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    volumes:
      - kafka_kraft_data:${KAFKA_DATA_PATH}
      - ./script/start-kafka-kraft.sh:/usr/local/bin/start-kafka-kraft.sh:ro
    entrypoint: [ "/bin/bash", "/usr/local/bin/start-kafka-kraft.sh" ]
    mem_limit: ${KAFKA_MEMORY_LIMIT}
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/9092' || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s
    networks:
      - shared-network

  connect:
    image: debezium/connect:${DEBEZIUM_CONNECT_VERSION}
    container_name: ${CONNECT_CONTAINER_NAME}
    ports:
      - "${CONNECT_PORT}:8083"
    environment:
      BOOTSTRAP_SERVERS: ${CONNECT_BOOTSTRAP_SERVERS}
      GROUP_ID: ${CONNECT_GROUP_ID}
      CONFIG_STORAGE_TOPIC: ${CONNECT_CONFIG_STORAGE_TOPIC}
      OFFSET_STORAGE_TOPIC: ${CONNECT_OFFSET_STORAGE_TOPIC}
      STATUS_STORAGE_TOPIC: ${CONNECT_STATUS_STORAGE_TOPIC}
      CONFIG_STORAGE_REPLICATION_FACTOR: ${CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR}
      OFFSET_STORAGE_REPLICATION_FACTOR: ${CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR}
      STATUS_STORAGE_REPLICATION_FACTOR: ${CONNECT_STATUS_STORAGE_REPLICATION_FACTOR}
      KEY_CONVERTER: ${CONNECT_KEY_CONVERTER}
      VALUE_CONVERTER: ${CONNECT_VALUE_CONVERTER}
      KEY_CONVERTER_SCHEMAS_ENABLE: "${CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE}"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "${CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE}"
      KAFKA_HEAP_OPTS: ${CONNECT_KAFKA_HEAP_OPTS}
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - connector_data:/kafka/connect
    mem_limit: ${CONNECT_MEMORY_LIMIT}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://${CONNECT_CONTAINER_NAME}:8083/ >/dev/null 2>&1 ||
            exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - shared-network

  # kafka-ui:
  #   image: ghcr.io/kafbat/kafka-ui:${KAFKA_UI_VERSION}
  #   container_name: ${KAFKA_UI_CONTAINER_NAME}
  #   ports:
  #     - "${KAFKA_UI_PORT}:8080"
  #   environment:
  #     DYNAMIC_CONFIG_ENABLED: "${KAFKA_UI_DYNAMIC_CONFIG_ENABLED}"
  #     KAFKA_CLUSTERS_0_NAME: ${KAFKA_UI_CLUSTER_NAME}
  #     KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_UI_BOOTSTRAP_SERVERS}
  #   depends_on:
  #     kafka:
  #       condition: service_healthy
  #   restart: unless-stopped
  #   networks:
  #     - shared-network

  temporal:
    image: temporalio/auto-setup:${TEMPORAL_VERSION}
    container_name: ${TEMPORAL_CONTAINER_NAME}
    depends_on:
      postgres-db:
        condition: service_healthy
    ports:
      - "${TEMPORAL_PORT}:7233"
    environment:
      DB: postgres12
      DB_PORT: ${TEMPORAL_POSTGRES_PORT}
      POSTGRES_SEEDS: ${TEMPORAL_POSTGRES_HOST}
      POSTGRES_USER: ${TEMPORAL_POSTGRES_USER}
      POSTGRES_PWD: ${TEMPORAL_POSTGRES_PASSWORD}

      DBNAME: ${TEMPORAL_POSTGRES_DB}
      VISIBILITY_DBNAME: ${TEMPORAL_VISIBILITY_POSTGRES_DB}

      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
      TEMPORAL_ADDRESS: ${TEMPORAL_CONTAINER_NAME}:7233
      TEMPORAL_CLI_ADDRESS: ${TEMPORAL_CONTAINER_NAME}:7233

      DEFAULT_NAMESPACE: ${TEMPORAL_DEFAULT_NAMESPACE}
      SKIP_DEFAULT_NAMESPACE_CREATION: "false"
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    mem_limit: ${TEMPORAL_MEMORY_LIMIT}
    healthcheck:
      test: [ "CMD-SHELL", "netstat -lnt | grep -q ':7233 '" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped
    networks:
      - shared-network

  temporal-admin-tools:
    image: temporalio/admin-tools:${TEMPORAL_ADMIN_TOOLS_VERSION}
    container_name: ${TEMPORAL_ADMIN_CONTAINER_NAME}
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: ${TEMPORAL_CONTAINER_NAME}:7233
      TEMPORAL_CLI_ADDRESS: ${TEMPORAL_CONTAINER_NAME}:7233
    stdin_open: true
    tty: true
    profiles:
      - ops-ui
    mem_limit: ${TEMPORAL_ADMIN_MEMORY_LIMIT}
    restart: unless-stopped
    networks:
      - shared-network

  temporal-ui:
    image: temporalio/ui:${TEMPORAL_UI_VERSION}
    container_name: ${TEMPORAL_UI_CONTAINER_NAME}
    depends_on:
      - temporal
    ports:
      - "${TEMPORAL_UI_PORT}:8080"
    environment:
      TEMPORAL_ADDRESS: ${TEMPORAL_CONTAINER_NAME}:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:${TEMPORAL_UI_PORT}
    profiles:
      - ops-ui
    mem_limit: ${TEMPORAL_UI_MEMORY_LIMIT}
    restart: unless-stopped
    networks:
      - shared-network

volumes:
  redis_data:
  cassandra_data:
  minio_data:
  postgres_data:
  elasticsearch_data:
  kafka_kraft_data:
  connector_data:

networks:
  shared-network:
    external: true
