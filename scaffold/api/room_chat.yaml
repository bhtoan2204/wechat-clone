version: 1
basePath: /api/v1

endpoints:
  - name: ChatCreateDirectConversation
    method: POST
    path: /chat/direct
    handler: CreateDirectConversationHandler
    auth: true
    usecase:
      name: RoomUsecase
      method: CreateDirectConversation
    request:
      struct: CreateDirectConversationRequest
      fields:
        - name: peer_account_id
          type: string
          required: true
    response:
      struct: ChatConversationResponse
      fields:
        - name: room_id
          type: string
        - name: name
          type: string
        - name: description
          type: string
        - name: room_type
          type: string
        - name: owner_id
          type: string
        - name: pinned_message_id
          type: string
        - name: member_count
          type: int
        - name: unread_count
          type: int64
        - name: last_message
          type: object
          struct: ChatMessageResponse
        - name: members
          type: array
          items:
            struct: ChatRoomMemberResponse
            fields:
              - name: account_id
                type: string
              - name: role
                type: string
              - name: display_name
                type: string
              - name: avatar_object_key
                type: string
        - name: created_at
          type: string
        - name: updated_at
          type: string

  - name: ChatCreateGroup
    method: POST
    path: /chat/groups
    handler: CreateGroupChatHandler
    auth: true
    usecase:
      name: RoomUsecase
      method: CreateGroupChat
    request:
      struct: CreateGroupChatRequest
      fields:
        - name: name
          type: string
          required: true
        - name: description
          type: string
        - name: member_ids
          type: array
    response:
      struct: ChatConversationResponse
      fields:
        - name: room_id
          type: string
        - name: name
          type: string
        - name: description
          type: string
        - name: room_type
          type: string
        - name: owner_id
          type: string
        - name: pinned_message_id
          type: string
        - name: member_count
          type: int
        - name: unread_count
          type: int64
        - name: last_message
          type: object
          struct: ChatMessageResponse
        - name: members
          type: array
          items:
            struct: ChatRoomMemberResponse
            fields:
              - name: account_id
                type: string
              - name: role
                type: string
        - name: created_at
          type: string
        - name: updated_at
          type: string

  - name: ChatUpdateGroup
    method: PATCH
    path: /chat/groups/:room_id
    handler: UpdateGroupChatHandler
    auth: true
    usecase:
      name: RoomUsecase
      method: UpdateGroupChat
    request:
      struct: UpdateGroupChatRequest
      fields:
        - name: room_id
          type: string
          required: true
        - name: name
          type: string
        - name: description
          type: string
    response:
      struct: ChatConversationResponse
      fields:
        - name: room_id
          type: string
        - name: name
          type: string
        - name: description
          type: string
        - name: room_type
          type: string
        - name: owner_id
          type: string
        - name: pinned_message_id
          type: string
        - name: member_count
          type: int
        - name: unread_count
          type: int64
        - name: last_message
          type: object
          struct: ChatMessageResponse
        - name: members
          type: array
          items:
            struct: ChatRoomMemberResponse
            fields:
              - name: account_id
                type: string
              - name: role
                type: string
        - name: created_at
          type: string
        - name: updated_at
          type: string

