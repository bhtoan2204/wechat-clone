    handler: ListChatConversationsHandler
    auth: true
    usecase:
      name: RoomUsecase
      method: ListChatConversations
    request:
      struct: ListChatConversationsRequest
      fields:
        - name: limit
          type: int
        - name: offset
          type: int
    response:
      struct: ChatConversationResponse
      collection: true
      fields:
        - name: room_id
          type: string
        - name: name
          type: string
        - name: description
          type: string
        - name: room_type
          type: string
        - name: owner_id
          type: string
        - name: pinned_message_id
          type: string
        - name: member_count
