      name: RoomUsecase
      method: GetChatConversation
    request:
      struct: GetChatConversationRequest
      fields:
        - name: room_id
          type: string
          required: true
    response:
      struct: ChatConversationResponse
      fields:
        - name: room_id
          type: string
        - name: name
          type: string
        - name: description
          type: string
        - name: room_type
          type: string
        - name: owner_id
          type: string
        - name: pinned_message_id
          type: string
        - name: member_count
