  - name: ChatListMessages
    method: GET
    path: /chat/conversations/:room_id/messages
    handler: ListChatMessagesHandler
    auth: true
    usecase:
      name: MessageUsecase
      method: ListChatMessages
    request:
      struct: ListChatMessagesRequest
      fields:
        - name: room_id
          type: string
          required: true
        - name: limit
          type: int
        - name: before_id
          type: string
        - name: before_at
          type: string
        - name: ascending
          type: bool
    response:
      struct: ChatMessageResponse
      collection: true
      fields:
        - name: id
          type: string
        - name: room_id
          type: string
        - name: sender_id
          type: string
        - name: message
          type: string
        - name: message_type
          type: string
        - name: status
          type: string
        - name: mentions
          type: array
          items:
            struct: ChatMessageMentionResponse
            fields:
              - name: account_id
                type: string
              - name: display_name
                type: string
              - name: username
                type: string
        - name: reactions
          type: array
          items:
            struct: ChatMessageReactionResponse
            fields:
              - name: emoji
                type: string
              - name: count
                type: int
              - name: reacted_by_me
                type: bool
              - name: account_ids
                type: array
        - name: mention_all
          type: bool
        - name: reply_to_message_id
          type: string
        - name: forwarded_from_message_id
          type: string
        - name: file_name
          type: string
        - name: file_size
          type: int64
        - name: mime_type
          type: string
        - name: object_key
          type: string
        - name: edited_at
          type: string
        - name: deleted_for_everyone
          type: bool
        - name: created_at
          type: string
        - name: reply_to
          type: object
          struct: ChatMessagePreviewResponse
        - name: forwarded_from
          type: object
          struct: ChatMessagePreviewResponse

