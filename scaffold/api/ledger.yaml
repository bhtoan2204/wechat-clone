version: 1
basePath: /api/v1

endpoints:
  - name: LedgerGetAccountBalance
    method: GET
    path: /ledger/wallet/balance
    handler: GetAccountBalanceHandler
    auth: true
    usecase:
      name: LedgerUsecase
      method: GetAccountBalance
    request:
      struct: GetAccountBalanceRequest
      fields:
        - name: currency
          type: string
          required: true
    response:
      struct: AccountBalanceResponse
      fields:
        - name: account_id
          type: string
        - name: currency
          type: string
        - name: balance
          type: int64

  - name: LedgerGetTransaction
    method: GET
    path: /ledger/transactions/:transaction_id
    handler: GetTransactionHandler
    auth: true
    usecase:
      name: LedgerUsecase
      method: GetTransaction
    request:
      struct: GetTransactionRequest
      fields:
        - name: transaction_id
          type: string
          required: true
    response:
      struct: TransactionResponse
      fields:
        - name: transaction_id
          type: string
        - name: currency
          type: string
        - name: created_at
          type: string
        - name: entries
          type: array
          items:
            struct: LedgerEntryResponse
            fields:
              - name: id
                type: int64
              - name: transaction_id
                type: string
              - name: account_id
                type: string
              - name: currency
                type: string
              - name: amount
                type: int64
              - name: created_at
                type: string
  - name: LedgerTransferTransaction
    method: POST
    path: /ledger/transfers
    handler: TransferTransactionHandler
    auth: true
    usecase:
      name: LedgerUsecase
      method: TransferTransaction
    request:
      struct: TransferTransactionRequest
      fields:
        - name: to_account_id
          type: string
          required: true
        - name: currency
          type: string
          required: true
        - name: amount
          type: int64
          required: true
        - name: metadata
          type: object
          required: false
    response:
      struct: TransactionTransactionResponse
      fields:
        - name: transaction_id
          type: string
        - name: currency
          type: string
        - name: created_at
          type: string
        - name: entries
          type: array
          items:
            struct: LedgerEntryResponse
            fields:
              - name: id
                type: int64
              - name: transaction_id
                type: string
              - name: account_id
                type: string
              - name: currency
                type: string
              - name: amount
                type: int64
              - name: created_at
                type: string
  - name: LedgerListTransaction
    method: GET
    path: /ledger/transactions
    handler: ListTransactionHandler
    auth: true
    usecase:
      name: LedgerUsecase
      method: ListTransaction
    request:
      struct: ListTransactionRequest
      fields:
        - name: cursor
          type: string
        - name: limit
          type: int
        - name: currency
          type: string
    response:
      struct: ListTransactionResponse
      fields:
        - name: records
          type: array
          items:
            struct: TransactionResponse
            fields:
              - name: transaction_id
                type: string
              - name: currency
                type: string
              - name: created_at
                type: string
              - name: entries
                type: array
                items:
                  struct: LedgerEntryResponse
                  fields:
                    - name: id
                      type: int64
                    - name: transaction_id
                      type: string
                    - name: account_id
                      type: string
                    - name: currency
                      type: string
                    - name: amount
                      type: int64
                    - name: created_at
                      type: string
        - name: next_cursor
          type: string
        - name: has_more
          type: bool
        - name: total
          type: int64
        - name: size
          type: int
        - name: limit
          type: int
