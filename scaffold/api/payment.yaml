version: 1
basePath: /api/v1

endpoints:
  - name: PaymentDeposit
    method: POST
    path: /payment/deposit
    handler: DepositHandler
    auth: true
    usecase:
      name: PaymentUsecase
      method: Deposit
    request:
      struct: DepositRequest
      fields:
        - name: amount
          type: int64
          required: true
    response:
      struct: DepositResponse
      fields:
        - name: message
          type: string
        - name: transaction_id
          type: string
        - name: balance
          type: int64
        - name: version
          type: int

  - name: PaymentRebuildProjection
    method: POST
    path: /payment/projection/rebuild
    handler: RebuildProjectionHandler
    auth: true
    usecase:
      name: PaymentUsecase
      method: RebuildProjection
    request:
      struct: RebuildProjectionRequest
      fields:
        - name: mode
          type: string
          required: true
        - name: account_id
          type: string
    response:
      struct: RebuildProjectionResponse
      fields:
        - name: message
          type: string
        - name: mode
          type: string
        - name: account_id
          type: string
        - name: accounts
          type: int
        - name: events_replayed
          type: int
        - name: transactions_rebuilt
          type: int
        - name: balances_rebuilt
          type: int
        - name: note
          type: string

  - name: PaymentTransfer
    method: POST
    path: /payment/transfer
    handler: TransferHandler
    auth: true
    usecase:
      name: PaymentUsecase
      method: Transfer
    request:
      struct: TransferRequest
      fields:
        - name: amount
          type: int64
          required: true
        - name: receiver_id
          type: string
          required: true
    response:
      struct: TransferResponse
      fields:
        - name: message
          type: string
        - name: transaction_id
          type: string
        - name: balance
          type: int64
        - name: version
          type: int

  - name: PaymentWithdrawal
    method: POST
    path: /payment/withdrawal
    handler: WithdrawalHandler
    auth: true
    usecase:
      name: PaymentUsecase
      method: Withdrawal
    request:
      struct: WithdrawalRequest
      fields:
        - name: amount
          type: int64
          required: true
    response:
      struct: WithdrawalResponse
      fields:
        - name: message
          type: string
        - name: transaction_id
          type: string
        - name: balance
          type: int64
        - name: version
          type: int

  - name: PaymentListTransaction
    method: GET
    path: /payment/transaction
    handler: ListTransactionHandler
    auth: true
    usecase:
      name: PaymentUsecase
      method: ListTransaction
    request:
      struct: ListTransactionRequest
      fields:
        - name: page
          type: int64
        - name: limit
          type: int64
    response:
      struct: ListTransactionResponse
      fields:
        - name: page
          type: int64
        - name: limit
          type: int64
        - name: balance
          type: int64
        - name: records
          type: array
          items:
            struct: TransactionRecord
            fields:
              - name: type
                type: string
              - name: amount
                type: int64
              - name: balance
                type: int64
              - name: date
                type: string
              - name: sender
                type: string
              - name: sender_id
                type: string
              - name: receiver
                type: string
              - name: receiver_id
                type: string

  - name: PaymentCreatePayment
    method: POST
    path: /payment/intents
    handler: CreatePaymentHandler
    auth: true
    usecase:
      name: PaymentUsecase
      method: CreatePayment
    request:
      struct: CreatePaymentRequest
      fields:
        - name: provider
          type: string
          required: true
        - name: transaction_id
          type: string
          required: true
        - name: amount
          type: int64
          required: true
        - name: currency
          type: string
          required: true
        - name: debit_account_id
          type: string
          required: true
        - name: credit_account_id
          type: string
          required: true
        - name: metadata
          type: object
    response:
      struct: CreatePaymentResponse
      fields:
        - name: provider
          type: string
        - name: transaction_id
          type: string
        - name: external_ref
          type: string
        - name: status
          type: string
        - name: checkout_url
          type: string

  - name: PaymentProcessWebhook
    method: POST
    path: /payment/webhooks/:provider
    handler: ProcessWebhookHandler
    usecase:
      name: PaymentUsecase
      method: ProcessWebhook
    request:
      struct: ProcessWebhookRequest
      fields:
        - name: provider
          type: string
          required: true
        - name: signature
          type: string
        - name: payload
          type: string
    response:
      struct: ProcessWebhookResponse
      fields:
        - name: provider
          type: string
        - name: transaction_id
          type: string
        - name: external_ref
          type: string
        - name: status
          type: string
        - name: duplicate
          type: bool
        - name: ledger_posted
          type: bool
