version: 1
basePath: /api/v1

endpoints:
  - name: AuthLogin
    method: POST
    path: /auth/login
    handler: LoginHandler
    usecase:
      name: AuthUsecase
      method: Login
    request:
      struct: LoginRequest
      fields:
        - name: email
          type: string
          required: true
        - name: password
          type: string
          required: true
    response:
      struct: LoginResponse
      fields:
        - name: token
          type: string
        - name: expires_at
          type: int64

  - name: AuthRegister
    method: POST
    path: /auth/register
    handler: RegisterHandler
    usecase:
      name: AuthUsecase
      method: Register
    request:
      struct: RegisterRequest
      fields:
        - name: display_name
          type: string
          required: true
        - name: email
          type: string
          required: true
        - name: password
          type: string
          required: true
    response:
      struct: RegisterResponse
      fields:
        - name: token
          type: string
        - name: expires_at
          type: int64

  - name: AuthLogout
    method: POST
    path: /auth/logout
    handler: LogoutHandler
    auth: true
    usecase:
      name: AuthUsecase
      method: Logout
    request:
      struct: LogoutRequest
      fields:
        - name: token
          type: string
    response:
      struct: LogoutResponse
      fields:
        - name: message
          type: string

  - name: AuthGetProfile
    method: GET
    path: /account/profile
    handler: GetProfileHandler
    auth: true
    usecase:
      name: AuthUsecase
      method: GetProfile
    request:
      struct: GetProfileRequest
      fields: []
    response:
      struct: GetProfileResponse
      fields:
        - name: id
          type: string
        - name: display_name
          type: string
        - name: email
          type: string
        - name: username
          type: string
        - name: avatar_object_key
          type: string
        - name: status
          type: string
        - name: email_verified
          type: bool
        - name: email_verified_at
          type: string
        - name: last_login_at
          type: string
        - name: password_changed_at
          type: string
        - name: created_at
          type: string
        - name: updated_at
          type: string

  - name: AuthUpdateProfile
    method: PUT
    path: /account/profile
    handler: UpdateProfileHandler
    auth: true
    usecase:
      name: AuthUsecase
      method: UpdateProfile
    request:
      struct: UpdateProfileRequest
      fields:
        - name: display_name
          type: string
          required: true
        - name: username
          type: string
          pointer: true
        - name: avatar_object_key
          type: string
          pointer: true
    response:
      struct: UpdateProfileResponse
      fields:
        - name: id
          type: string
        - name: display_name
          type: string
        - name: email
          type: string
        - name: username
          type: string
        - name: avatar_object_key
          type: string
        - name: status
          type: string
        - name: email_verified
          type: bool
        - name: email_verified_at
          type: string
        - name: last_login_at
          type: string
        - name: password_changed_at
          type: string
        - name: created_at
          type: string
        - name: updated_at
          type: string

  - name: AuthVerifyEmail
    method: POST
    path: /account/verify-email
    handler: VerifyEmailHandler
    auth: true
    usecase:
      name: AuthUsecase
      method: VerifyEmail
    request:
      struct: VerifyEmailRequest
      fields: []
    response:
      struct: VerifyEmailResponse
      fields:
        - name: message
          type: string

  - name: AuthConfirmVerifyEmail
    method: POST
    path: /account/verify-email/confirm
    handler: ConfirmVerifyEmailHandler
    usecase:
      name: AuthUsecase
      method: ConfirmVerifyEmail
    request:
      struct: ConfirmVerifyEmailRequest
      fields:
        - name: token
          type: string
          required: true
    response:
      struct: ConfirmVerifyEmailResponse
      fields:
        - name: message
          type: string
        - name: verified_at
          type: string

  - name: AuthChangePassword
    method: PUT
    path: /account/change-password
    handler: ChangePasswordHandler
    auth: true
    usecase:
      name: AuthUsecase
      method: ChangePassword
    request:
      struct: ChangePasswordRequest
      fields:
        - name: current_password
          type: string
          required: true
        - name: new_password
          type: string
          required: true
    response:
      struct: ChangePasswordResponse
      fields:
        - name: message
          type: string

  - name: AuthGetAvatar
    method: GET
    path: /account/avatar/:account_id
    handler: GetAvatarHandler
    auth: true
    usecase:
      name: AuthUsecase
      method: GetAvatar
    request:
      struct: GetAvatarRequest
      fields:
        - name: account_id
          type: string
          required: true
    response:
      struct: GetAvatarResponse
      fields:
        - name: url
          type: string
        - name: expires_at
          type: string

  - name: AuthCreatePresignedUrl
    method: POST
    path: /account/avatar/presigned-url
    handler: CreatePresignedUrlHandler
    auth: true
    usecase:
      name: AuthUsecase
      method: CreatePresignedUrl
    request:
      struct: CreatePresignedUrlRequest
      fields:
    response:
      struct: CreatePresignedUrlResponse
      fields:
        - name: presigned_url
          type: string
        - name: expires_at
          type: string
        - name: method
          type: string
