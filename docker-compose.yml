  #   restart: "no"

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  cassandra:
    image: cassandra:5.0
    container_name: chat-cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: chat-cluster
      CASSANDRA_DC: dc1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    volumes:
      - cassandra_data:/var/lib/cassandra
    restart: unless-stopped

  cassandra-init:
    image: cassandra:5.0
    depends_on:
      - cassandra
    entrypoint: >
      /bin/sh -c "
      until cqlsh cassandra 9042 -e 'DESCRIBE KEYSPACES'; do
        echo 'waiting for cassandra';
        sleep 5;
      done;
      cqlsh cassandra 9042 -e \"
      CREATE KEYSPACE IF NOT EXISTS chat_app
      WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};
      \";
      "
    restart: "no"

  minio:
    image: minio/minio:latest
    container_name: chat-minio
    ports:
      - "9001:9000"
      - "9002:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'waiting for minio';
        sleep 2;
      done;
      /usr/bin/mc mb -p local/chat-media || true;
      /usr/bin/mc anonymous set public local/chat-media || true;
      "
    restart: "no"

  oracle-db:
    image: gvenzl/oracle-free:23.4-slim
    container_name: oracle23c-free
    ports:
      - "1521:1521"
      - "5500:5500" # EM Express (web UI)
    environment:
      ORACLE_PASSWORD: Oracle123
      APP_USER: appuser
      APP_USER_PASSWORD: App123
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./oracle-init:/container-entrypoint-initdb.d
    shm_size: "1g"
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.3.2
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    volumes:
      - kafka_data:/var/lib/kafka/data

  connect:
    image: debezium/connect:2.6
    container_name: debezium-connect
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_status

      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1

      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    depends_on:
      - kafka
    volumes:
      - connector_data:/kafka/connect

  connector-init:
    image: curlimages/curl:8.12.1
    depends_on:
      - connect
    volumes:
      - ./connector:/connector:ro
    command: ["/bin/sh", "/connector/register_connectors.sh"]
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "9000:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka
      - zookeeper

  # consul:
  #   image: hashicorp/consul:latest
  #   ports:
  #     - "8500:8500"
  #     - "8600:8600/udp"
  #   volumes:
  #     - consul_data:/consul/data
  #   command: consul agent -dev -client=0.0.0.0
  #   restart: unless-stopped

volumes:
  go_pkg_mod:
  go_build_cache:
  redis_data:
  cassandra_data:
  minio_data:
  oracle_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  connector_data:
  consul_data:
