services:
  redis:
    image: redis:${REDIS_VERSION}
    container_name: ${REDIS_CONTAINER_NAME}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  cassandra:
    image: cassandra:${CASSANDRA_VERSION}
    container_name: ${CASSANDRA_CONTAINER_NAME}
    ports:
      - "${CASSANDRA_PORT}:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: ${CASSANDRA_CLUSTER_NAME}
      CASSANDRA_DC: ${CASSANDRA_DC}
      CASSANDRA_ENDPOINT_SNITCH: ${CASSANDRA_ENDPOINT_SNITCH}
      MAX_HEAP_SIZE: ${CASSANDRA_MAX_HEAP_SIZE}
      HEAP_NEWSIZE: ${CASSANDRA_HEAP_NEWSIZE}
    volumes:
      - cassandra_data:/var/lib/cassandra
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cqlsh localhost 9042 -e 'DESCRIBE KEYSPACES' >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 50s

  minio:
    image: minio/minio:${MINIO_VERSION}
    container_name: ${MINIO_CONTAINER_NAME}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:9000/minio/health/live >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  oracle-db:
    image: gvenzl/oracle-free:${ORACLE_VERSION}
    container_name: ${ORACLE_CONTAINER_NAME}
    ports:
      - "${ORACLE_DB_PORT}:1521"
      - "${ORACLE_EM_PORT}:5500"
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      APP_USER: ${ORACLE_APP_USER}
      APP_USER_PASSWORD: ${ORACLE_APP_USER_PASSWORD}
      ORACLE_ARCHIVE_LOG_DEST: ${ORACLE_ARCHIVE_LOG_DEST:-/opt/oracle/oradata/FREE/archivelog}
      ORACLE_REDO_LOG_SIZE_MB: ${ORACLE_REDO_LOG_SIZE_MB:-1024}
      ORACLE_REDO_LOG_GROUP_COUNT: ${ORACLE_REDO_LOG_GROUP_COUNT:-4}
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./oracle-init:/container-entrypoint-initdb.d
      - ./oracle-startup:/container-entrypoint-startdb.d
    shm_size: ${ORACLE_SHM_SIZE}
    restart: unless-stopped

volumes:
  redis_data:
  cassandra_data:
  minio_data:
  oracle_data: